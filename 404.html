<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-image: url("ImageErreur404.png");
            background-repeat: no-repeat;
            background-size: cover;

        }

        #Bouton {
            background-color: transparent;
            border: none;
            padding: 10px;

        }

        #MenuPrincipal {
            -webkit-user-drag: none; /* Safari et Chrome */
            user-drag: none;
            user-select: none;
            animation: Retrecit 0.3 forwards;
        }
        
        #MenuPrincipal:hover{
            transform: scale(1.02);
            cursor: pointer;
            animation: TailleAugmente 0.3s forwards;
        }


        @keyframes TailleAugmente {
            from {
                transform: scale(1);
            }
            to {
                transform: scale(1.3);
            }
        }

            @keyframes Retrecit {
                from {
                    transform: scale(1.3);
                }
                to {
                    transform: scale(1);
                }
            }
    </style>
</head>
<body>
    <button id="Bouton">
        <img src="RevenirAuMenuPrincipal.png" alt="Revenir au menu principal" id="MenuPrincipal">
    </button>
    <script>
        const BoutonRevenirAuMenu = document.getElementById("Bouton");
        BoutonRevenirAuMenu.addEventListener("click", function() {
            window.location.href = "/"
        })
    </script>
</body>
</html>
