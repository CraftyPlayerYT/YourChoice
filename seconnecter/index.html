<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Se connecter</title>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body>
    <div id="SeConnecterAvecGoogle"></div>
    <div
      class="cf-turnstile"
      data-sitekey="0x4AAAAAACzbnroUNPVDSvhB"
      data-theme="light"
      data-size="normal"
      data-callback="TestReussi"
      data-error-callback="TestRate"
      data-expired-callback="TestExpire"
    ></div>

    <input type="email" id="email">
    <input type="password" id="motdepasse">
    <input type="email" id="emailDeRecuperation">
    <button id="creerCompte">Créer le compte</button>
    <!-- Script Jquery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    
    <!-- Script avec les fonctions de base -->
    <script src="https://yourchoiceproject.vercel.app/FonctionsDeBase.js"></script>
    <!-- Script de connexion avec Google -->
    <script src="https://accounts.google.com/gsi/client"></script>
    <!-- Script Local -->
    <script src="https://yourchoiceproject.vercel.app/seconnecter/script.js"></script>
</body>
</html>
